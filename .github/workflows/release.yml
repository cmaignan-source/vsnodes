name: Release Allep

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create allep file
        uses: vimtor/action-zip@v1.2
        with:
          files: VisualScripts/ install-config.yml
          recursive: false
          dest: vsnodes_allplanfrance.allep

      - name: Create release draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"

          gh release create "$tag" `
            --title="$tag" `
            --draft `
            vsnodes_allplanfrance.allep
